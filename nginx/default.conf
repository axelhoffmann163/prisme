# Port 80 — Dashboard principal (auth JS)
server {
    listen 80;
    server_name prisme.axelhoffmann.fr;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Port 81 — Partage public (aucune auth, share.html uniquement)
server {
    listen 81;
    server_name prisme.axelhoffmann.fr;
    root /usr/share/nginx/html;

    location / {
        try_files $uri /share.html;
    }
}
