server {
    listen 80;
    server_name prisme.axelhoffmann.fr;

    root /usr/share/nginx/html;
    index index.html;

    # Header pour effacer les credentials Basic mémorisés
    add_header WWW-Authenticate 'None realm="clear"' always;
    add_header Clear-Site-Data '"credentials"' always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
