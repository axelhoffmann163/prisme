# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name prisme.axelhoffmann.fr;
    return 301 https://$host$request_uri;
}

# HTTPS — Dashboard principal
server {
    listen 443 ssl;
    server_name prisme.axelhoffmann.fr;

    ssl_certificate /etc/letsencrypt/live/prisme.axelhoffmann.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prisme.axelhoffmann.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Port 8081 — Partage public (HTTPS)
server {
    listen 8081 ssl;
    server_name prisme.axelhoffmann.fr;

    ssl_certificate /etc/letsencrypt/live/prisme.axelhoffmann.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prisme.axelhoffmann.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /share.html;
    }
}
