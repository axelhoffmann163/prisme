services:

  db:
    image: postgres:16-alpine
    container_name: presswatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: presswatch
      POSTGRES_USER: presswatch_user
      POSTGRES_PASSWORD: presswatch2025
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presswatch_user -d presswatch"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=50
        -c autovacuum=on

  collector:
    build: .
    container_name: presswatch-collector
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "
        python scripts/init_db.py &&
        python main.py
      "

  api:
    build: .
    container_name: presswatch-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    image: nginx:alpine
    container_name: presswatch-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:81"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro

  adminer:
    image: adminer:latest
    container_name: presswatch-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
