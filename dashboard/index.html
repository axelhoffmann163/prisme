<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prisme — Veille presse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

    /* ── Header ── */
    .header { background: #1a3a5c; color: white; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .live { display: flex; align-items: center; gap: 6px; font-size: 12px; opacity: 0.8; }
    .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Tabs ── */
    .tabs { background: #15304d; display: flex; padding: 0 24px; gap: 2px; }
    .tab { padding: 10px 18px; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: rgba(255,255,255,0.85); }
    .tab.active { color: white; border-bottom-color: #4a9eff; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 24px 0; }
    .stat { background: white; border-radius: 8px; padding: 12px 14px; border: 1px solid #e5e5e5; }
    .stat-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .stat-value { font-size: 22px; font-weight: 600; color: #1a3a5c; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ════════════════════════════════
       PAGE 1 — FLUX
    ════════════════════════════════ */
    .flux-layout { display: flex; padding: 14px 24px; gap: 16px; }
    .sidebar { width: 230px; flex-shrink: 0; }
    .sidebar-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .btn-icon { background: none; border: none; font-size: 20px; color: #1a3a5c; cursor: pointer; line-height: 1; }
    .watchlist-item { background: white; border-radius: 8px; padding: 10px 12px; border: 1px solid #e5e5e5; margin-bottom: 6px; cursor: pointer; position: relative; transition: border-color 0.15s; }
    .watchlist-item:hover { border-color: #1a3a5c; }
    .watchlist-item.active { border-color: #1a3a5c; background: #f0f6ff; }
    .watchlist-name { font-size: 13px; font-weight: 500; }
    .watchlist-query { font-size: 11px; color: #888; margin-top: 2px; }
    .watchlist-badge { position: absolute; top: 8px; right: 8px; background: #1a3a5c; color: white; border-radius: 10px; font-size: 10px; padding: 2px 6px; }
    .watchlist-delete { position: absolute; bottom: 8px; right: 8px; font-size: 10px; color: #cc3333; cursor: pointer; opacity: 0; background: none; border: none; transition: opacity 0.15s; }
    .watchlist-item:hover .watchlist-delete { opacity: 1; }
    .new-watch-form { background: white; border-radius: 8px; padding: 12px; border: 1px solid #B5D4F4; margin-bottom: 8px; display: none; }
    .new-watch-form input { width: 100%; height: 32px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; margin-bottom: 6px; }
    .new-watch-form button { width: 100%; height: 32px; background: #1a3a5c; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .content { flex: 1; min-width: 0; }
    .search-wrap { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-input { flex: 1; height: 40px; padding: 0 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: #1a3a5c; }
    .search-btn { height: 40px; padding: 0 18px; background: #1a3a5c; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 12px; cursor: pointer; color: #555; }
    .filter-btn.active { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    .result-info { font-size: 12px; color: #888; margin-bottom: 8px; }
    .articles { display: flex; flex-direction: column; gap: 6px; }
    .article { background: white; border-radius: 8px; padding: 12px 14px; border: 1px solid #e5e5e5; cursor: pointer; transition: border-color 0.15s; }
    .article:hover { border-color: #1a3a5c; }
    .article-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; flex-wrap: wrap; }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .badge-PQN { background: #E6F1FB; color: #0C447C; }
    .badge-PQR { background: #EAF3DE; color: #3B6D11; }
    .badge-TV { background: #FAEEDA; color: #854F0B; }
    .badge-Radio { background: #FBEAF0; color: #72243E; }
    .badge-Magazine { background: #EEEDFE; color: #3C3489; }
    .badge-Agence { background: #FAECE7; color: #993C1D; }
    .badge-Natif { background: #E1F5EE; color: #0F6E56; }
    .badge-International { background: #F1EFE8; color: #5F5E5A; }
    .source-name { font-size: 12px; color: #888; }
    .article-time { font-size: 11px; color: #bbb; margin-left: auto; }
    .article-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 3px; }
    .article-summary { font-size: 12px; color: #666; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ════════════════════════════════
       PAGE 2 — SOURCES
    ════════════════════════════════ */
    .sources-page { padding: 16px 24px; }
    .card { background: white; border-radius: 8px; border: 1px solid #e5e5e5; overflow: hidden; margin-bottom: 14px; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 13px; font-weight: 600; }
    .form-add { display: grid; grid-template-columns: 1fr 2fr 120px 100px auto; gap: 8px; align-items: end; padding: 14px 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; color: #888; }
    .field input, .field select { height: 34px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .field input:focus { outline: none; border-color: #1a3a5c; }
    .btn { height: 34px; padding: 0 14px; border-radius: 6px; border: 1px solid #ddd; font-size: 12px; cursor: pointer; background: white; color: #555; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: #1a3a5c; color: white; border-color: transparent; }
    .btn-primary:hover { background: #0d2a45; }
    .btn-success { background: #1D9E75; color: white; border-color: transparent; }
    .test-result { padding: 8px 16px; font-size: 12px; display: none; border-top: 1px solid #e5e5e5; }
    .test-ok { color: #1D9E75; background: #f0faf6; }
    .test-err { color: #cc3333; background: #fff5f5; }
    .src-filters { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid #e5e5e5; flex-wrap: wrap; align-items: center; }
    .src-search { height: 30px; padding: 0 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; margin-left: auto; width: 180px; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.5px; background: #f9f9f9; border-bottom: 1px solid #e5e5e5; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.src-row:hover td { background: #fafafa; }
    .src-name { font-weight: 500; }
    .src-url { font-size: 11px; color: #185FA5; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-ok { display: flex; align-items: center; gap: 5px; color: #1D9E75; font-size: 12px; }
    .status-err { display: flex; align-items: center; gap: 5px; color: #cc3333; font-size: 12px; }
    .status-off { display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 12px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: #1D9E75; } .dot-err { background: #cc3333; } .dot-off { background: #ccc; }
    .acts { display: flex; gap: 4px; align-items: center; }
    .btn-sm { height: 26px; padding: 0 9px; font-size: 11px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; background: white; color: #555; }
    .btn-sm:hover { background: #f5f5f5; }
    .btn-sm-danger { color: #cc3333; border-color: #f5c0c0; }
    .toggle-sw { position: relative; width: 36px; height: 20px; display: inline-block; }
    .toggle-sw input { opacity: 0; width: 0; height: 0; }
    .toggle-sl { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: .2s; }
    .toggle-sl:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
    input:checked + .toggle-sl { background: #1D9E75; }
    input:checked + .toggle-sl:before { transform: translateX(16px); }
    .edit-row { display: none; background: #f0f6ff; }
    .edit-row td { padding: 8px 12px; }
    .edit-grid { display: grid; grid-template-columns: 1fr 2fr 110px 80px auto auto; gap: 6px; align-items: center; }
    .edit-grid input, .edit-grid select { height: 30px; padding: 0 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; }

    .loading { text-align: center; padding: 30px; color: #aaa; font-size: 13px; }
    .no-items { text-align: center; padding: 16px; color: #aaa; font-size: 13px; }

    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2,1fr); }
      .flux-layout { flex-direction: column; padding: 10px 14px; }
      .sidebar { width: 100%; }
      .form-add { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🗞 Prisme — Veille presse</h1>
  <div class="live"><div class="dot-live"></div><span id="live-status">Chargement…</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('flux', this)">Flux en direct</div>
  <div class="tab" onclick="showTab('sources', this)">Sources</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Articles aujourd'hui</div><div class="stat-value" id="stat-today">—</div></div>
  <div class="stat"><div class="stat-label">Total collectés</div><div class="stat-value" id="stat-total">—</div></div>
  <div class="stat"><div class="stat-label">Sources actives</div><div class="stat-value" id="stat-sources">—</div></div>
  <div class="stat"><div class="stat-label">Flux en erreur</div><div class="stat-value" id="stat-errors">—</div></div>
</div>

<!-- ════════ PAGE FLUX ════════ -->
<div class="page active" id="page-flux">
  <div class="flux-layout">
    <div class="sidebar">
      <div class="sidebar-title">
        Mes veilles
        <button class="btn-icon" onclick="toggleWatchForm()" title="Nouvelle veille">+</button>
      </div>
      <div class="new-watch-form" id="new-watch-form">
        <input type="text" id="watch-name" placeholder="Nom (ex : Emploi)">
        <input type="text" id="watch-query" placeholder="Mots-clés (ex : emploi chômage)">
        <button onclick="saveWatchlist()">Créer la veille</button>
      </div>
      <div id="watchlists-list"><div class="loading">Chargement…</div></div>
    </div>

    <div class="content">
      <div class="search-wrap">
        <input type="text" class="search-input" id="search-input" placeholder="Rechercher dans toute la presse française…" onkeydown="if(event.key==='Enter') doSearch()">
        <button class="search-btn" onclick="doSearch()">Rechercher</button>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter(this,null)">Toutes</button>
        <button class="filter-btn" onclick="setFilter(this,'PQN')">PQN</button>
        <button class="filter-btn" onclick="setFilter(this,'PQR')">PQR</button>
        <button class="filter-btn" onclick="setFilter(this,'TV')">TV</button>
        <button class="filter-btn" onclick="setFilter(this,'Radio')">Radio</button>
        <button class="filter-btn" onclick="setFilter(this,'Magazine')">Magazine</button>
        <button class="filter-btn" onclick="setFilter(this,'Agence')">Agence</button>
      </div>
      <div class="result-info" id="result-info"></div>
      <div class="articles" id="articles-list"><div class="loading">Chargement…</div></div>
    </div>
  </div>
</div>

<!-- ════════ PAGE SOURCES ════════ -->
<div class="page" id="page-sources">
  <div class="sources-page">

    <div class="card">
      <div class="card-header"><div class="card-title">Ajouter une source</div></div>
      <div class="form-add">
        <div class="field"><label>Nom</label><input type="text" id="add-name" placeholder="ex : Le Monde"/></div>
        <div class="field"><label>URL du flux RSS</label><input type="text" id="add-url" placeholder="https://…"/></div>
        <div class="field"><label>Catégorie</label>
          <select id="add-cat">
            <option>PQN</option><option>PQR</option><option>TV</option>
            <option>Radio</option><option>Magazine</option><option>Agence</option>
            <option>Natif</option><option>International</option>
          </select>
        </div>
        <div class="field"><label>Fréquence</label>
          <select id="add-int">
            <option value="5">5 min</option><option value="15">15 min</option>
            <option value="30" selected>30 min</option><option value="60">1h</option>
            <option value="360">6h</option>
          </select>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end">
          <button class="btn" onclick="testUrl()">Tester</button>
          <button class="btn btn-primary" onclick="addSource()">+ Ajouter</button>
        </div>
      </div>
      <div class="test-result" id="test-result"></div>
    </div>

    <div class="card">
      <div class="src-filters">
        <button class="filter-btn active" onclick="setSrcFilter(this,'all')">Toutes</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'PQN')">PQN</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'PQR')">PQR</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'TV')">TV</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'Radio')">Radio</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'Magazine')">Magazine</button>
        <button class="filter-btn" onclick="setSrcFilter(this,'errors')">En erreur</button>
        <input type="text" class="src-search" placeholder="Rechercher…" oninput="srcSearch(this.value)">
      </div>
      <div id="sources-table"><div class="loading">Chargement…</div></div>
    </div>

  </div>
</div>

<script>
const API = 'http://128.140.41.234:8000';
let currentCategory = null;
let currentQuery = '';
let currentWatchlistId = null;
let allSources = [];
let srcFilter = 'all';
let srcSearchVal = '';

// ── Tabs ─────────────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'sources') loadSources();
}

// ── Stats ────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await fetch(`${API}/stats`).then(r => r.json());
    document.getElementById('stat-today').textContent = (d.articles_today||0).toLocaleString('fr');
    document.getElementById('stat-total').textContent = (d.articles_total||0).toLocaleString('fr');
    document.getElementById('stat-sources').textContent = d.sources_active||0;
    document.getElementById('stat-errors').textContent = d.feeds_in_error||0;
    document.getElementById('live-status').textContent = 'En direct';
  } catch(e) { document.getElementById('live-status').textContent = 'Connexion…'; }
}

// ── Helpers ──────────────────────────────────────────────────
function timeAgo(d) {
  if (!d) return '';
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return 'à l\'instant';
  if (s < 3600) return `il y a ${Math.floor(s/60)} min`;
  if (s < 86400) return `il y a ${Math.floor(s/3600)}h`;
  return `il y a ${Math.floor(s/86400)}j`;
}

function renderArticles(articles) {
  const list = document.getElementById('articles-list');
  if (!articles || !articles.length) {
    list.innerHTML = '<div class="loading">Aucun article trouvé.</div>';
    return;
  }
  list.innerHTML = articles.map(a => `
    <div class="article" onclick="window.open('${a.url}','_blank')">
      <div class="article-meta">
        <span class="badge badge-${(a.category||'PQN').replace(/\s/g,'')}">${a.category||'PQN'}</span>
        <span class="source-name">${a.source_name||''}</span>
        <span class="article-time">${timeAgo(a.collected_at)}</span>
      </div>
      <div class="article-title">${a.title}</div>
      ${a.summary ? `<div class="article-summary">${a.summary}</div>` : ''}
    </div>
  `).join('');
}

// ── Flux ─────────────────────────────────────────────────────
async function loadArticles() {
  currentWatchlistId = null;
  document.querySelectorAll('.watchlist-item').forEach(e => e.classList.remove('active'));
  document.getElementById('articles-list').innerHTML = '<div class="loading">Chargement…</div>';
  try {
    let url = `${API}/articles?limit=50`;
    if (currentCategory) url += `&category=${currentCategory}`;
    const data = await fetch(url).then(r => r.json());
    document.getElementById('result-info').textContent = `${data.length} articles`;
    renderArticles(data);
  } catch(e) {
    document.getElementById('articles-list').innerHTML = '<div class="loading">Erreur de connexion.</div>';
  }
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { loadArticles(); return; }
  currentQuery = q;
  currentWatchlistId = null;
  document.querySelectorAll('.watchlist-item').forEach(e => e.classList.remove('active'));
  document.getElementById('articles-list').innerHTML = '<div class="loading">Recherche…</div>';
  try {
    let url = `${API}/search?q=${encodeURIComponent(q)}&limit=50`;
    if (currentCategory) url += `&category=${currentCategory}`;
    const data = await fetch(url).then(r => r.json());
    document.getElementById('result-info').textContent = `${data.total} résultat${data.total>1?'s':''} pour "${q}"`;
    renderArticles(data.results);
  } catch(e) {
    document.getElementById('articles-list').innerHTML = '<div class="loading">Erreur.</div>';
  }
}

function setFilter(btn, category) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = category;
  if (currentWatchlistId) loadWatchlistArticles(currentWatchlistId);
  else if (currentQuery) doSearch();
  else loadArticles();
}

// ── Veilles ──────────────────────────────────────────────────
async function loadWatchlists() {
  try {
    const data = await fetch(`${API}/watchlists`).then(r => r.json());
    const c = document.getElementById('watchlists-list');
    if (!data.length) {
      c.innerHTML = '<div class="no-items">Aucune veille.<br>Cliquez sur + pour en créer une.</div>';
      return;
    }
    c.innerHTML = data.map(w => `
      <div class="watchlist-item" id="watch-${w.id}" onclick="loadWatchlistArticles(${w.id})">
        <div class="watchlist-name">${w.name}</div>
        <div class="watchlist-query">${w.query}</div>
        ${w.new_articles > 0 ? `<span class="watchlist-badge">${w.new_articles}</span>` : ''}
        <button class="watchlist-delete" onclick="event.stopPropagation();removeWatchlist(${w.id})">Supprimer</button>
      </div>
    `).join('');
  } catch(e) {}
}

async function loadWatchlistArticles(id) {
  currentWatchlistId = id;
  document.querySelectorAll('.watchlist-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById(`watch-${id}`);
  if (el) el.classList.add('active');
  document.getElementById('articles-list').innerHTML = '<div class="loading">Chargement…</div>';
  try {
    const data = await fetch(`${API}/watchlists/${id}/articles`).then(r => r.json());
    document.getElementById('result-info').textContent = `${data.total} articles — veille "${data.watchlist.name}"`;
    document.getElementById('search-input').value = data.watchlist.query;
    renderArticles(data.articles);
    setTimeout(loadWatchlists, 500);
  } catch(e) {
    document.getElementById('articles-list').innerHTML = '<div class="loading">Erreur.</div>';
  }
}

function toggleWatchForm() {
  const f = document.getElementById('new-watch-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function saveWatchlist() {
  const name = document.getElementById('watch-name').value.trim();
  const query = document.getElementById('watch-query').value.trim();
  if (!name || !query) { alert('Remplissez le nom et les mots-clés.'); return; }
  await fetch(`${API}/watchlists?name=${encodeURIComponent(name)}&query=${encodeURIComponent(query)}`, {method:'POST'});
  document.getElementById('watch-name').value = '';
  document.getElementById('watch-query').value = '';
  document.getElementById('new-watch-form').style.display = 'none';
  loadWatchlists();
}

async function removeWatchlist(id) {
  if (!confirm('Supprimer cette veille ?')) return;
  await fetch(`${API}/watchlists/${id}`, {method:'DELETE'});
  if (currentWatchlistId === id) loadArticles();
  loadWatchlists();
}

// ── Sources ──────────────────────────────────────────────────
async function loadSources() {
  try {
    const data = await fetch(`${API}/sources`).then(r => r.json());
    allSources = data.sources || [];
    renderSources();
  } catch(e) {
    document.getElementById('sources-table').innerHTML = '<div class="loading">Erreur de connexion.</div>';
  }
}

function getStatus(s) {
  if (!s.active) return {cls:'status-off', dot:'dot-off', label:'Désactivée'};
  if (!s.last_status) return {cls:'status-ok', dot:'dot-ok', label:'En attente'};
  if ([200,301,302,304].includes(s.last_status)) return {cls:'status-ok', dot:'dot-ok', label:'En ligne'};
  return {cls:'status-err', dot:'dot-err', label:`Erreur ${s.last_status}`};
}

function renderSources() {
  let s = allSources;
  if (srcFilter !== 'all') {
    if (srcFilter === 'errors') s = s.filter(x => x.active && x.last_status && ![200,301,302,304].includes(x.last_status));
    else s = s.filter(x => x.category === srcFilter);
  }
  if (srcSearchVal) {
    const q = srcSearchVal.toLowerCase();
    s = s.filter(x => x.name.toLowerCase().includes(q) || x.url.toLowerCase().includes(q));
  }
  if (!s.length) {
    document.getElementById('sources-table').innerHTML = '<div class="loading">Aucune source.</div>';
    return;
  }
  document.getElementById('sources-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Source</th><th>URL RSS</th><th>Catégorie</th>
        <th>Statut</th><th>Art./24h</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${s.map(x => {
          const st = getStatus(x);
          return `
            <tr class="src-row" id="srow-${x.id}">
              <td><div class="src-name">${x.name}</div></td>
              <td><div class="src-url" title="${x.url}">${x.url}</div></td>
              <td><span class="badge badge-${x.category}">${x.category}</span></td>
              <td><div class="${st.cls}"><div class="dot ${st.dot}"></div>${st.label}</div></td>
              <td>${x.articles_today||0}</td>
              <td>
                <div class="acts">
                  <label class="toggle-sw" title="${x.active?'Désactiver':'Activer'}">
                    <input type="checkbox" ${x.active?'checked':''} onchange="toggleSrc('${x.id}',this.checked)">
                    <span class="toggle-sl"></span>
                  </label>
                  <button class="btn-sm" onclick="showEditSrc('${x.id}')">Éditer</button>
                  <button class="btn-sm btn-sm-danger" onclick="deleteSrc('${x.id}','${x.name}')">Suppr.</button>
                </div>
              </td>
            </tr>
            <tr class="edit-row" id="sedit-${x.id}">
              <td colspan="6">
                <div class="edit-grid">
                  <input id="en-${x.id}" value="${x.name}" placeholder="Nom">
                  <input id="eu-${x.id}" value="${x.url}" placeholder="URL">
                  <select id="ec-${x.id}">${['PQN','PQR','TV','Radio','Magazine','Agence','Natif','International'].map(c=>`<option ${c===x.category?'selected':''}>${c}</option>`).join('')}</select>
                  <select id="ei-${x.id}">${[5,15,30,60,360].map(v=>`<option value="${v}" ${v===x.interval_min?'selected':''}>${v<60?v+' min':(v/60)+'h'}</option>`).join('')}</select>
                  <button class="btn btn-success" onclick="saveEditSrc('${x.id}')">Sauvegarder</button>
                  <button class="btn" onclick="hideEditSrc('${x.id}')">Annuler</button>
                </div>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function setSrcFilter(btn, f) {
  document.querySelectorAll('.src-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  srcFilter = f;
  renderSources();
}

function srcSearch(v) { srcSearchVal = v; renderSources(); }

function showEditSrc(id) {
  const r = document.getElementById(`sedit-${id}`);
  if (r) r.style.display = r.style.display === 'table-row' ? 'none' : 'table-row';
}
function hideEditSrc(id) {
  const r = document.getElementById(`sedit-${id}`);
  if (r) r.style.display = 'none';
}

async function saveEditSrc(id) {
  const name = document.getElementById(`en-${id}`).value;
  const url = document.getElementById(`eu-${id}`).value;
  const category = document.getElementById(`ec-${id}`).value;
  const interval_min = document.getElementById(`ei-${id}`).value;
  await fetch(`${API}/sources/${id}?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&category=${category}&interval_min=${interval_min}`, {method:'PUT'});
  loadSources();
}

async function toggleSrc(id, active) {
  await fetch(`${API}/sources/${id}/toggle?active=${active}`, {method:'PATCH'});
  loadSources();
  loadStats();
}

async function deleteSrc(id, name) {
  if (!confirm(`Supprimer définitivement "${name}" ?`)) return;
  await fetch(`${API}/sources/${id}`, {method:'DELETE'});
  loadSources();
}

async function testUrl() {
  const url = document.getElementById('add-url').value.trim();
  if (!url) { alert('Entrez une URL.'); return; }
  const d = document.getElementById('test-result');
  d.style.display = 'block'; d.className = 'test-result'; d.textContent = 'Test en cours…';
  try {
    const data = await fetch(`${API}/sources/test?url=${encodeURIComponent(url)}`).then(r => r.json());
    d.className = `test-result ${data.ok ? 'test-ok' : 'test-err'}`;
    d.textContent = data.message;
  } catch(e) { d.className = 'test-result test-err'; d.textContent = 'Erreur de connexion.'; }
}

async function addSource() {
  const name = document.getElementById('add-name').value.trim();
  const url = document.getElementById('add-url').value.trim();
  const category = document.getElementById('add-cat').value;
  const interval_min = document.getElementById('add-int').value;
  if (!name || !url) { alert('Nom et URL requis.'); return; }
  const data = await fetch(`${API}/sources?name=${encodeURIComponent(name)}&url=${encodeURIComponent(url)}&category=${category}&interval_min=${interval_min}`, {method:'POST'}).then(r=>r.json());
  if (data.error) { alert(data.error); return; }
  document.getElementById('add-name').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('test-result').style.display = 'none';
  loadSources();
  loadStats();
}

// ── Init ─────────────────────────────────────────────────────
loadStats();
loadArticles();
loadWatchlists();
setInterval(loadStats, 60000);
setInterval(loadWatchlists, 300000);
</script>
</body>
</html>
